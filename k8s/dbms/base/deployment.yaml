apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  name: iris-dbms
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: iris-dbms
  template:
    metadata:
      annotations: {}
      labels:
        io.kompose.service: iris-dbms
    spec:
      serviceAccountName: iris-dbms-sa
      containers:
        - envFrom:
               - configMapRef:
                   name: iris-dbms-configs
               - secretRef:
                   name: iris-dbms-secrets
          name: iris-dbms
          image: dpage/pgadmin4:latest
          resources:
            limits:
              memory: "2Gi"
            requests:
              cpu: "0.5"
              memory: "250Mi"
              ephemeral-storage: "2Gi"
          livenessProbe:
            exec:
              command:
                - curl -X GET "http://localhost/" || exit 1
            failureThreshold: 5
            periodSeconds: 30
            timeoutSeconds: 10
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
